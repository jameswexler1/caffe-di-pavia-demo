{{ define "main" }}
<section class="section">
  <div class="container narrow">
    <h1 data-aos="fade-up">{{ .Title }}</h1>
    <p class="muted" data-aos="fade-up">{{ .Date.Format "02/01/2006" }}</p>
    <div class="content" data-aos="fade-up">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
